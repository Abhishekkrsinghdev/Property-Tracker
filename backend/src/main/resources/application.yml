spring:
  application:
    name: proptrack-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/proptrack}
    username: ${DB_USER:proptrack}
    password: ${DB_PASSWORD:proptrack}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns schema — JPA just validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    default-property-inclusion: non_null

  # Multipart file upload limits
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 20MB

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# ── Application-level config ──────────────────────────────────────────────────
app:
  # Frontend URL for email links
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

  # JWT
  jwt:
    secret: ${JWT_SECRET:ThisIsAVeryLongSecretKeyForJWTThatIsAtLeast256BitsLongForHS256Algorithm}
    expiration-ms: 86400000        # 24 hours
    refresh-expiration-ms: 604800000 # 7 days

  # FastAPI AI Service
  ai-service:
    url: ${AI_SERVICE_URL:http://localhost:8000}

  # Resend Email (mocks to console if key is re_placeholder)
  resend:
    api-key: ${RESEND_API_KEY:re_placeholder}
    from-email: ${RESEND_FROM_EMAIL:noreply@proptrack.app}

  # File Storage
  # provider: 'local' → stores files on Docker volume (default, free)
  # provider: 's3'    → routes uploads to any S3-compatible bucket
  storage:
    provider: ${APP_STORAGE_PROVIDER:local}
    dir: ${APP_STORAGE_DIR:uploads}
    s3:
      endpoint: ${APP_STORAGE_S3_ENDPOINT:}
      region: ${APP_STORAGE_S3_REGION:ap-south-1}
      access-key: ${APP_STORAGE_S3_ACCESS_KEY:}
      secret-key: ${APP_STORAGE_S3_SECRET_KEY:}
      bucket: ${APP_STORAGE_S3_BUCKET:proptrack}
      public-url-prefix: ${APP_STORAGE_S3_PUBLIC_URL_PREFIX:}

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    com.proptrack: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO