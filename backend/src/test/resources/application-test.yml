spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false  # Skip migrations in unit tests to keep it fast

app:
  jwt:
    secret: "ThisIsASecretKeyForTestingPurposesOnlyAndItMustBeLongEnough"
  ai-service:
    url: "http://localhost:8000"
