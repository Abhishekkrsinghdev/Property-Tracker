version: '3.9'

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: proptrack-postgres
    environment:
      POSTGRES_DB: proptrack
      POSTGRES_USER: proptrack
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proptrack -d proptrack"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── FastAPI AI Service ────────────────────────────────────────────────────────
  # Starts before Spring Boot so the AI client bean can connect on startup
  fastapi:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: proptrack-fastapi
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SPRING_BOOT_URL: http://spring-boot:8080
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Spring Boot Backend ───────────────────────────────────────────────────────
  spring-boot:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: proptrack-spring
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/proptrack
      DB_USER: proptrack
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      AI_SERVICE_URL: http://fastapi:8000
      RESEND_API_KEY: ${RESEND_API_KEY:-re_placeholder}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-noreply@proptrack.app}
      # Storage — default: local disk volume (cost-free for Oracle Cloud VM)
      APP_STORAGE_PROVIDER: ${APP_STORAGE_PROVIDER:-local}
      # Uncomment and set these when switching to S3/Supabase:
      # APP_STORAGE_S3_ENDPOINT: ${APP_STORAGE_S3_ENDPOINT:-}
      # APP_STORAGE_S3_REGION: ${APP_STORAGE_S3_REGION:-ap-south-1}
      # APP_STORAGE_S3_ACCESS_KEY: ${APP_STORAGE_S3_ACCESS_KEY:-}
      # APP_STORAGE_S3_SECRET_KEY: ${APP_STORAGE_S3_SECRET_KEY:-}
      # APP_STORAGE_S3_BUCKET: ${APP_STORAGE_S3_BUCKET:-proptrack}
      # APP_STORAGE_S3_PUBLIC_URL_PREFIX: ${APP_STORAGE_S3_PUBLIC_URL_PREFIX:-}
    ports:
      - "8080:8080"     # Exposed locally for direct testing
    volumes:
      - uploads:/app/uploads   # Persists uploaded files across container restarts
    depends_on:
      postgres:
        condition: service_healthy
      fastapi:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 45s   # Spring Boot needs time to start + run Flyway migrations
    restart: unless-stopped

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: proptrack-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      spring-boot:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Allows Nginx to reach Vite on host
    restart: unless-stopped

volumes:
  pgdata:
    name: proptrack-pgdata
  uploads:
    name: proptrack-uploads     # Persists receipts & documents on the Oracle VM disk