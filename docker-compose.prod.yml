# docker-compose.prod.yml
# Used by the CI/CD pipeline on the Oracle Cloud VM.
# Images are pulled from GitHub Container Registry (GHCR) — not built on the server.
# Run: docker compose -f docker-compose.prod.yml up -d

version: '3.9'

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: proptrack-postgres
    environment:
      POSTGRES_DB: proptrack
      POSTGRES_USER: proptrack
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proptrack -d proptrack"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # NOT exposed externally — only accessible within the Docker network

  # ── FastAPI AI Service ────────────────────────────────────────────────────────
  fastapi:
    image: ${FASTAPI_IMAGE:-ghcr.io/Abhishekkrsinghdev/Property-Tracker-fastapi:latest}
    container_name: proptrack-fastapi
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SPRING_BOOT_URL: http://spring-boot:8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Spring Boot Backend ───────────────────────────────────────────────────────
  spring-boot:
    image: ${BACKEND_IMAGE:-ghcr.io/Abhishekkrsinghdev/Property-Tracker-backend:latest}
    container_name: proptrack-spring
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/proptrack
      DB_USER: proptrack
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      AI_SERVICE_URL: http://fastapi:8000
      RESEND_API_KEY: ${RESEND_API_KEY:-re_placeholder}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-noreply@proptrack.app}
      APP_STORAGE_PROVIDER: ${APP_STORAGE_PROVIDER:-local}
      APP_STORAGE_S3_ENDPOINT: ${APP_STORAGE_S3_ENDPOINT:-}
      APP_STORAGE_S3_REGION: ${APP_STORAGE_S3_REGION:-ap-south-1}
      APP_STORAGE_S3_ACCESS_KEY: ${APP_STORAGE_S3_ACCESS_KEY:-}
      APP_STORAGE_S3_SECRET_KEY: ${APP_STORAGE_S3_SECRET_KEY:-}
      APP_STORAGE_S3_BUCKET: ${APP_STORAGE_S3_BUCKET:-proptrack}
      APP_STORAGE_S3_PUBLIC_URL_PREFIX: ${APP_STORAGE_S3_PUBLIC_URL_PREFIX:-}
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      fastapi:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ── Nginx Reverse Proxy + Static Frontend ─────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: proptrack-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro     # Built React app served statically
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      spring-boot:
        condition: service_healthy
    restart: unless-stopped

  # ── Certbot (SSL) — run once to provision, auto-renews via cron ──────────────
  certbot:
    image: certbot/certbot
    container_name: proptrack-certbot
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"
    restart: unless-stopped

volumes:
  pgdata:
    name: proptrack-pgdata
  uploads:
    name: proptrack-uploads
  certbot-conf:
    name: proptrack-certbot-conf
  certbot-www:
    name: proptrack-certbot-www
