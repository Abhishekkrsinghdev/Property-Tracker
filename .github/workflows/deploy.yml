name: CD — Deploy to Oracle Cloud

on:
  push:
    branches: [master]       # Auto-deploy on every merge to master
  workflow_dispatch:        # Also allow manual trigger from GitHub Actions UI

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/proptrack

jobs:
  # ── Build & push Docker images to GitHub Container Registry ─────────────────
  build-images:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      backend-tag: ${{ steps.meta-backend.outputs.tags }}
      fastapi-tag: ${{ steps.meta-fastapi.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend image ────────────────────────────────────────────────────────
      - name: Metadata — backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── FastAPI image ────────────────────────────────────────────────────────
      - name: Metadata — fastapi
        id: meta-fastapi
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-fastapi
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & push fastapi
        uses: docker/build-push-action@v5
        with:
          context: ./ai-service
          push: true
          tags: ${{ steps.meta-fastapi.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Oracle Cloud VM via SSH ────────────────────────────────────────
  deploy:
    name: SSH deploy → Oracle Cloud
    runs-on: ubuntu-latest
    needs: build-images
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            set -e
            cd /opt/proptrack

            # Pull latest compose file & deploy scripts from GitHub
            git pull origin master

            # Log in to GHCR to pull private images
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Set image tags from the build job
            export BACKEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest"
            export FASTAPI_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-fastapi:latest"

            # Pull latest images
            docker pull $BACKEND_IMAGE
            docker pull $FASTAPI_IMAGE

            # Rolling restart — zero downtime for Nginx-served static frontend
            docker compose -f docker-compose.prod.yml up -d --no-build

            # Prune dangling images to save disk space
            docker image prune -f

            echo "✅ Deployment complete."
