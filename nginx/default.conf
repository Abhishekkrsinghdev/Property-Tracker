server {
    listen 80;
    server_name localhost;

    # ── Spring Boot API ────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://spring-boot:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Actuator health (useful for Docker healthcheck)
    location /actuator/ {
        proxy_pass http://spring-boot:8080;
    }

    # ── FastAPI AI Service (internal only — not exposed publicly) ─────────────
    # In production on Oracle, this block is removed.
    # FastAPI is called server-side by Spring Boot, never by the browser.
    location /ai-internal/ {
        proxy_pass         http://fastapi:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 120s;    # AI calls can take longer
    }

    # FastAPI docs (local dev only)
    location /ai-docs {
        proxy_pass http://fastapi:8000/docs;
    }

    # ── React Dev Server (local dev only) ─────────────────────────────────────
    # In production, React is on Vercel — this block is removed.
    location / {
        proxy_pass         http://host.docker.internal:5173;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";   # WebSocket for Vite HMR
        proxy_set_header   Host       $host;
    }
}